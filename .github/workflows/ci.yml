name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Laravel (PHP)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_sqlite, sqlite3, pdo_pgsql, mbstring, openssl, tokenizer, xml
          coverage: none

      - name: Install dependencies
        working-directory: ./backend
        run: composer install --prefer-dist --no-progress

      - name: Copy .env
        working-directory: ./backend
        run: cp .env.example .env.testing

      - name: Generate key
        working-directory: ./backend
        run: php artisan key:generate --env=testing

      - name: Run Larastan
        working-directory: ./backend
        run: vendor/bin/phpstan analyse --memory-limit=512M

      - name: Debug environment
        working-directory: ./backend
        run: |
          echo "--- PHP version ---"
          php -v
          echo "--- PHP loaded extensions (filtered) ---"
          php -m | grep -iE "pdo|sqlite|openssl|mbstring|tokenizer|xml|json|hash" | sort
          echo "--- .env.testing (DB/APP keys) ---"
          grep -E "^(APP_KEY|APP_ENV|DB_|SESSION_|CACHE_|QUEUE_)" .env.testing | sed 's/APP_KEY=.*/APP_KEY=<redacted>/'
          echo "--- pest version ---"
          vendor/bin/pest --version || true

      - name: Run tests
        working-directory: ./backend
        run: vendor/bin/pest --colors=never

  frontend:
    name: Next.js (TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Build
        working-directory: ./frontend
        run: npm run build

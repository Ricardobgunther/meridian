# Auxiliary dev services only — the Laravel app and the Next.js frontend run
# on the host (não containerizados aqui).
#
# Fila / Queue worker (R11): a invitation email é enfileirada e despachada
# after-commit (QUEUE_CONNECTION=database por padrão), então um worker PRECISA
# estar rodando para que os emails saiam da tabela `jobs`:
#   - Local:  `composer dev` (no backend/) já sobe `php artisan queue:listen`
#             junto com o server, vite e logs. Nada a fazer aqui.
#             Sozinho: `php artisan queue:work` (ou `queue:listen` em dev).
#   - Prod:   rodar `php artisan queue:work` como processo supervisionado
#             (supervisor/systemd) e `php artisan queue:restart` em cada deploy
#             (ver .ai/workflows/deploy-flow.md → "Filas e Queue Worker").
# Um worker containerizado exigiria primeiro um Dockerfile do backend, que o
# projeto ainda não tem — fora do escopo do R11.
services:
  # Mailpit — SMTP catcher for local development.
  # Backend (Laravel) envia emails para porta 1025; UI web disponível em http://localhost:8025.
  # Não usar em produção.
  mailpit:
    image: axllent/mailpit:latest
    container_name: projeto1-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # UI web
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    name: projeto1-network
